<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLC Expert</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PLC Expert">
  <meta name="theme-color" content="#1976d2">
  
  <!-- Icône locale - pas d'URL externe -->
  <link rel="apple-touch-icon" href="icon.png">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { text-align: center; max-width: 400px; }
    .logo {
      width: 120px; height: 120px;
      background: #1976d2; border-radius: 28px;
      margin: 0 auto 24px; display: flex;
      align-items: center; justify-content: center;
      font-size: 48px; font-weight: 700;
      box-shadow: 0 8px 32px rgba(25, 118, 210, 0.3);
    }
    h1 { font-size: 32px; margin-bottom: 8px; color: #1976d2; }
    .subtitle { font-size: 16px; opacity: 0.8; margin-bottom: 32px; }
    .install {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 20px; border-radius: 16px;
      font-size: 14px; line-height: 1.6;
    }
    .install strong { color: #1976d2; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">PLC</div>
    <h1>PLC Expert</h1>
    <p class="subtitle">Assistant Automatisme Industriel</p>
    <div class="install">
      <strong>Installer sur iPhone :</strong><br>
      1. Bouton Partager ↓<br>
      2. Sur l'écran d'accueil<br>
      3. Ajouter
    </div>
  </div>
</body>
</html>
